front:
  text: 序浙中精於醫學者有二高子居錢塘者曰士宗先生居四明者曰鼓峰先生余志學時慕士宗先生之名欲受業其門迫於貧不果每得其著述不厭研究以為私淑之益洎後聞鼓峰先生所言多奇論治病多奇中則又心竊願見之而不獲一晤其人以為恨乙巳春越溪王謙中來為余言鼓峰醫術當代少有出其右者且以其所著醫家心法示余余深喜數十年景企之私一旦得讀其書不啻見其人何快如之及披閲終編見其用心似欲出前人意表而修辭不免紕繆於軒岐仲景心竊異之鼓峰之奇乃如是歟何所見與所聞之不同也夫天下之理莫不本於正何有於奇意主於奇則索隱行怪而惑世欺人之言出未有不悖聖賢之道者讀鼓峰之書而想其平日之所言所行時出於奇者亦約略可見較之士宗之持身整飭應事周慎而其著述典而可則者不相徑庭歟不揣鄙陋就其書中有不合於軒岐正義者妄為糾正爰以濟世之心切也鼓峰而心存乎濟世者諒不以豫言為吹索也夫雍正三年歲次乙巳嘉平既望錢塘胡珏念菴氏識
