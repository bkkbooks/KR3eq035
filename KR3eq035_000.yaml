body:
  text: 診法治病之要在臨證時先察其內外臟腑經絡新久虛實痰食血氣才以脈合之如證與脈合或正治或從治可也有證與脈不合者則當審其輕重辨其真假或舍證從脈或舍脈從證以治之復有證與時不合者或舍證從時或舍時從證以治之證脈時三者須互相參考內經之法大要在察色按脈審時辨證驗陰陽之多寡識寒熱之真假分別臟腑雌雄端理經絡浮沉神機之有出有入氣化之或升或降須皆參互詳察體認既確則神明可通矣何謂內言七情也喜怒憂思悲恐驚也七情之病起於臟七情過極必生拂鬱病從內起拂鬱之脈大抵多弦澀凝滯其來也必不能緩其去也必不肯遲先有一種似數非數躁動之象細體認之是無焰之火也是無韻之音也是往來不圓滑也此為郁脈法當疏之發之如火在下而以濕草蓋之則悶而不舒必至燒乾而自盡故疏之發之使火氣透則反可以自存何也郁是氣抑鬱則氣不透不透則熱熱則為火矣古方疏發以越鞠丸為主嚴用和以逍遙散代之如單得郁脈上二方是也如鬱而血為火逼變成燥證疏肝益腎湯從水生木左歸飲重加歸芍或不清乃加丹皮山梔黃芩以清肝膽二經所謂夫婦並治也拂鬱二字烏能概得七情惟五運可以言郁若七情不專主郁內經九氣論言之詳矣何謂外言六淫也風寒暑濕燥火是也六淫之邪或從皮毛而傳絡從絡傳經從經傳腑傳臟是也亦有竟感於絡竟感於經者六淫所感必生拂鬱病從外入故必皮毛先閉外束其所感之邪而蒸蒸發熱也法當疏之發之是也大抵脈浮或洪或大或緊而必數者也是燎原之火也是擊撞之聲也是往來不肯沉靜而出於皮膚之外也亦謂之郁脈是外郁也疏之發之不愈則霜雪以壓之古方麻黃桂枝白虎承氣等劑是也此真外感也易之以羌活沖和者亦真外感也有內傷似外感者此火不可發散也散之則亡陽不可霜雪以壓之壓之則火滅初起以小柴胡湯加減調之可也逍遙散加生地合生脈飲加黃芩之類以滋腎生肝生金滋水可也重則六味飲加歸芍合生脈可也蓋非水無以救火也非有根之水無以救離根之火也六氣之在兩間動潤蒸乾舉大地以生化萬物乃天之正氣也若本是淫氣則何能生長化收藏乎惟是過則為害害則為淫亦緣人之六氣有愆感而為病因名之日六淫今人遂以六氣稱六淫何捨本而言末認主以作賊弗思甚矣六氣之感惟風寒能郁皮毛腠理之間若本及為標即不可以言郁且風則腠理發泄又善行而數變亦不得為郁至若火與濕乃五運之郁非關六氣也內傷似外感無庸散發不可涼遏所論甚正至用小柴胡逍遙則其理又非蓋內傷非勞倦即房室非譏飽失宜即憂思過度當須溫補或從溫化所謂勞者溫之損者溫之是也若用此二方鮮有不拔其根而壞其真者也何謂臟腑有從腑遷臟者有從臟遷腑者如陽明傷食則氣阻而脾不能運化其病遷於脾初起法當先消食食消則氣通而脾運矣或久之則脾病益深必先救脾何也腑尚可病臟不堪久病也腑主氣氣無形無形治之以無形易也臟主血血有形有形者亦須假無形以治之而後能有形故難也傳曰無形之氣易補有形之血難償此之謂也消食者保和枳朮等類是也然不可過於消經曰大積大聚皆可犯也衰其半而已如過於消則氣衰矣消之不得其法或不及則食積而生熱熱則脾病當用參術加五味異功散六君子湯或加枳桔以開提健運再佐以芩連以消其積熱此臟腑相救緩急之法也各臟腑可類推之六腑主傳化物以氣言則可五臟主藏神志以血言則不可臟主藏神腑主傳物故臟主無形而腑主有形有形者氣化行而易愈無形者神志傷而難全全故經云臟不可傷臟傷則失守而陰虛故不易治也若專言臟主血為有形未免牽強其説蓋入胃之水穀傳之於肺而流溢奉心之氣而化赤由腎之衝脈而布散外而充膚熱肉內而蓄藏於肝至於周身經隧之血又總統於脾所謂脾藏營而胃主血也如此則血之生始出入皆五臟之氣化流行而所主專在脾胃不可以腑主氣而臟主血分屬也分屬之論初看似若出人意表細疏其理則非積久生熱間亦有之脾病溫補得其要矣配以枳桔亦屬兩歧必以為熱而佐以芩連固矣哉先生之為論也寧不知始為熱中末傳寒中乎何謂經絡經者如江河之經地其筋脈生於肉中絡者如藤之絡石其筋脈生於皮里肉外經筋屬五臟絡筋屬六腑屬五臟者以血藥補之以行經藥通之補之者歸芍熟地是也通之者川芎秦艽沒藥乳香是也屬六腑者以氣藥補之以走絡藥通之補之者參耆白朮是也通之者羌活柴胡葛根是也然又要看其病之深淺而彼此相通不可執一也內經以經屬陰而絡屬陽未嘗以經屬臟而絡屬腑也以三陰三陽論之則經脈亦有陽以陰絡傷陽絡傷論之則絡脈亦有陰至謂絡脈如藤之絡石則所言者乃外絡孫絡而遺卻內絡大絡矣論欲出奇反悖於理何謂新久有內傷之新有外感之新有內傷之久有外感之久內傷之新補之當早外感之新散之戒重如補之遲遷延成弱矣散之重變成他證矣內傷之久補之當峻當速外感之久散之不可峻不可猛不可速何也人之元氣有限病久必傷元氣若再攻之元氣竭矣真陰亡矣經云邪之所湊其氣必虛又曰粗工洶洶以為可攻此之謂也內傷外感揆輕重而治得其宜何論新久設內傷久而胃氣大虛不勝重劑用峻用速反致其變外感新而邪氣方熾緩則如焚如溺可不乘其元氣未漓而急攻盡剿乎略有畏縮必受其弊又今之外感挾內傷者多即輕散亦須斟酌何謂虛實有陰虛有陽虛有先天之陰陽虛何謂陰虛血虛也何謂陽虛氣虛也血虛者補其血四物湯之類是也氣虛者補其氣補中益氣湯之類是也先天之陰虛六味左歸之類是也先天之陽虛八味還少虎潛右歸之類是也有攻伐太過之陽虛如用寒涼而致陽遏不升當用參耆術以溫之甚者薑桂以助之又甚者八味右歸從其原以救之有攻伐太過之陰虛如用發散而致津液乾枯當用歸芍熟地以滋之枸杞龜鹿阿膠黏膩之物以填之是也以陰陽為氣血是矣以先天之陰陽貼有形之氣血則非是蓋先天之陰陽乃常先身生之精與所稟賦之真屬無形之太極者也若以後天之氣血混同立論則粗矣何謂食膏粱煿炙酒酪湩乳能生火以傷胃之陰傷陰者救之四物以養血佐之芩連梔柏以清火浮瓜沉李冷水寒冰能滅火而傷胃之陽傷陽者救之理中以養氣佐之桂附豆蔻以生火至於飢飽失時中氣受傷當補而兼運六君子湯加枳實桔梗之類運而提之內經只言胃陽而不言胃陰蓋胃陽乃中土充和之氣臟腑氣血榮衛經絡周身無一不取給焉故不可傷也今創言胃陰殊屬臆見究竟遵古説脾陰為理正何謂痰有食積之痰有中虛之痰有水泛水沸所為之痰食積之痰消其積則痰自除保和太安枳朮之類虛者六君子之類中虛之痰或脾虛不運或胃虛不容脾虛不運則積六君子加白豆蔻神麯是也胃虛不容則聚六君子加砂仁神麯是也水泛為痰土虛不能攝水也其痰濃而白補中益氣加半夏木香白豆蔻是也水沸為痰其痰白如沫吐出時如蟹沫水頃變為稠黏之水矣此腎水不足不能制火火緊而沸也六味丸主之陰虛水泛中胃未傷而脈數者可作腎虛火緊而用六味若真火不足土乏生原脾溏胃弱者乃脾敗而津不攝非水沸也重劑固補可以救持如用六味必擯於危何謂血凡六淫七情之病皆有因死血薄積於臟腑而成者其證見於外或似外感或似內傷醫者多以見證治之鮮不謬矣大凡死血在內其脈必澀滯其出於皮膚也必不滿其入於筋骨也必不完其形大都如線塗生漆不能充潤之狀醫者遇此病多以痰食求之而於死血多不知察故備言之此證察識頗難治亦不易攻補溫潤只在毫釐之辨耳慧心者於脈證形色上互相參證則亦難遁其情矣何謂證與脈合與脈不合有外感之脈證有內傷之脈證外感者翕翕發熱或蒸蒸發熱其脈必洪大浮數是證與脈合也如發熱而脈不洪大浮數是證與脈不合也傳曰陽證得陰脈者死此句是論傷寒若別證不可便以死論此必是火遏也或胃陰不能充拓也或腎水不能化其榮血也則舍證從脈可也火遏者逍遙散加薄荷生地以發之或加丹皮山梔屈曲下行以通之胃陰不能充拓者四物湯重加熟地枸杞人參麥冬五味以滋之腎水不能化營血者六味左歸以補之如內傷而外不發熱其脈當靜反洪大浮躁而數是證與脈不合也傳曰陰證得陽脈者生此句亦是論傷寒若別證又不可便許為生此是陰亡也或陽明有食與火也或腎虛不能納氣也或過服烏附而下焦津液枯竭也又有一種重按有力卻不弦從肌肉滲開脈與肉無界限此近於浮洪豁大也總是陰之象也陰亡也如陰亡分先後天以救其陰有食與火者健運兼清涼也腎虛不能納氣者六味都氣是也過服烏附者六味加知柏是也脈與肉無界限者六味加歸芍杞子棗仁合生脈也凡證皆有合有不合舉此一端可以引伸觸類矣傷寒之外所謂別證者即時行感冒以及勞倦內傷諸證是也發熱而得標陽反得里陰之脈是機神不能浮合於外也陽氣不得內接於陰也斯時到手即溫無庸顧慮以為火遏而用逍遙等劑名雖發越其實涼降是下井而投之以石矣吾怪世醫拋棄可憑之脈專習無根之論舍大道而不求惟從俗以自逞病家信其膚詞稱其穩當以為解鬱退熱切中病情朝斯夕斯日復一日而不知潛撥其本暗損其真以致變為無可挽回之證皆由此等之説誤之也何謂證與時不合譬之夏月惡熱而躁不當用辛熱矣然卻是無根之火狂越於外非人參桂附八味無以反飛越之孤陽傳曰桂附清蒸熱是也此舍時從證之謂也又如冬月畏寒怕冷必當用辛熱矣然卻是火鬱於中火鬱生風衝突元氣氣從火散故凜凜畏寒或辛甘以發之或芩連承氣以通之則火透而寒冷除矣傳曰硝黃解戰寒是也此亦舍時從證之謂也夏月用涼藥冬月用熱藥互看桂附消蒸硝黃解戰無本杜撰之言不知出於何典此條所論本是正理贅此二語反覺有畫蛇添足之病二十五法方論五五二十五方之機軸出於張景嶽五陰煎五柴胡飲其用藥法象較穩不似十方之私心擬議不可為訓也然細閲之尚未能該括亦未能的確不移後起者當為補正始成完備足厥陰肝足少陽膽木主病變見五證用藥之法肝與膽自病為正邪用逍遙散瀉木中之木肝之心病為實邪用七味飲瀉木中之火肝之脾病為微邪用小柴胡湯瀉木中之土肝之肺病為賊邪用左金丸瀉木中之金肝之腎病為虛邪用滋腎生肝散瀉木中之水手少陰心手太陽小腸火主病變見五證用藥之法心小腸自病為正邪用歸脾湯瀉火中之火心之脾病為實邪用遠志飲子瀉火中之土心之肺病為微邪用龍骨丸瀉火中之金心之腎病為賊邪用導赤散瀉火中之水心之肝病為虛邪用養榮湯瀉火中之木心包絡三焦附足太陰脾足陽明胃土主病變見五證用藥之法脾與胃自病為正邪用六君子湯瀉土中之土脾之肺病為實邪用四君子湯瀉土中之金脾之腎病為微邪用理中湯瀉土中之水脾之肝病為賊邪用建中湯瀉土中之木脾之火病為虛邪用香連丸瀉土中之火手太陰肺手陽明大腸金主病變見五證用藥之法肺大腸自病為正邪用瀉白散瀉金中之金肺之腎病為實邪用生脈散瀉金中之水肺之肝病為微邪用生金滋水飲瀉金中之木肺之心病為賊邪用黃耆湯瀉金中之火肺之脾病為虛邪用補中益氣湯瀉金中之土足少陰腎足太陽膀胱水主病變見五證用藥之法腎膀胱自病為正邪用六味飲瀉水中之水腎之肝病為實邪用疏肝益腎湯瀉水中之木腎之心病為微邪用八味丸瀉水中之火腎之脾病為賊邪用右歸飲瀉水中之土腎之肺病為虛邪用左歸飲瀉水中之金命門附木中之木逍遙散治肝膽二經鬱火以致脅痛頭眩或胃脘當心而痛或肩背絆痛或時眼赤痛連及太陽無論六經傷寒但見陽證悉用此方或婦人鬱怒傷肝致血妄行赤白淫閉砂淋崩濁等證俱宜此方加減治之易曰風以散之此方是也柴胡白朮茯苓各一錢當歸白朮各錢半炙甘草三分薑棗引右方加丹皮山桅各一錢名加味逍遙散去丹皮山梔加吳茱萸黃連同炒名左金逍遙散加龍膽草三錢亦名逍遙散加生地或熟地三錢名黑逍遙散木中之木是本臟風動之邪也其證來多夾雜氣血陰陽皆有是證此方論尚膚淺不切當另補正木中之火七味飲治肝經氣虛筋無所養變為寒證以致筋骨疼痛腳軟懶行並傷寒服涼藥過多木中無火手足牽引肝經血虛以致火燥筋攣變為結核瘰癧等證經曰辛以潤之此方是也熟地山藥山萸肉丹皮茯苓澤瀉肉桂木中之火木中生養之氣若在五邪為實治有別法非火實諸證當舒達其木也火虛諸證亦恐非宜木中之土小柴胡湯治少陽膽經傷寒之證凡耳聾脅痛口渴目赤及夏秋六經瘧疾俱當用此方人參黃芩柴胡半夏各一錢炙甘草三分右方加丹皮山桅各一錢名加味小柴胡湯木中之土乃木虛其位而土反侮之亦名橫欲於木中瀉土別有證治苟能散精而淫氣其內助之功不小矣木中之金左金丸治肝經鬱火酒濕發黃胸脅痛不可忍每食吞酸如醋浸心噯出於口齒不可合吳茱萸一兩黃連六兩木中之金是金來逆凌也為賊邪亦曰縱所引方論俱不合木中之水滋腎生肝散治肝火鬱於胃中以致倦怠嗜臥飲食不思口燥咽乾及內虛小便自遺頻數無度凡傷寒後熱已退而見口渴者用之熟地山藥山萸肉丹皮茯苓澤瀉以上分兩照六味古方減用柴胡當歸白朮各一錢五味子五分炙甘草三分木中之水是母來乘子也為順名虛邪水寒上乘當別有方證火中之火歸脾湯治心火衰微不能生土以致土困金敗外見咳嗽吐痰寒熱往來盜汗急以此方去木香加白芍治之凡見脾胃衰弱飲食不思大便泄瀉總由君火不明所致此補本法也凡各種虛證補中益氣湯所不能效者投以此方余嘗以此方加酒炒白芍北五味子以斂心神奏效更神也人參白朮茯神各錢半黃耆炙當歸各二錢棗仁炒一錢遠志蜜炙錢半木香磨五分甘草炙三分龍眼黑棗各三枚生薑三片右方加丹皮山梔名加味歸脾湯火中之火爍石流金矣涼颸一扇大暑西流而作解若威福過甚寧不畏在下者起而承之乎火中之土遠志飲子治風入大腸傳為風痢膿血並見但裡急後重而腹不痛者此方主之遠志一錢白朮錢半黃耆當歸各二錢防風六分炙甘草五分或加桔梗火中之土乃母虛而子反乘之逆道也在五邪為實實者瀉之當別有方法火中之金龍骨丸治腎氣不足不能上交心火者此方最宜龍骨煅蓯蓉酒洗去鱗膜補骨脂鹽水炒二蠶沙各二兩二錢五味子一兩右各為末蜜丸梧子大每服三十丸火中之金是妻來乘夫寡畏而司晨也三綱紊而可無法以治之乎火中之水導赤散治心火亢盛小腸鬱結不能通利此方主之白濁沙淋等證合逍遙散生地甘草梢竹葉一本作生地木通黃芩三味與此方異又黃芩下有或用黃連或用甘草八字注火中之水洪濤泛溢天下憂其溺矣寧不思敷土之禹功乎火中之木養榮湯凡屬大虛證勿論其脈與證但服此方其病悉退此十全大補湯對子也十全大補但分氣血此則五臟皆補無乎不到虛寒極者豫嘗加附子以治之三陰瘧一本作陰虛更妙較古方小異人參當歸各三錢白朮白芍黃耆茯苓各二錢陳皮遠志肉棗仁炒研肉桂各錢半熟地五錢五味子炙甘草各五分薑棗火中之木為母來乘子抱薪救火也在五邪為虛在病為風熱在中見為兩火相煽沿燒林木矣當別有方法土中之土六君子湯治脾胃氣虛飲食不運致成痰癖不時咳嗽或胃氣虛寒動成嘔惡凡虛瘧及諸病後痢後俱當以此方調之人參白朮茯苓炙甘草陳皮半夏土中之土是太過而敦阜也物不可以終盛皆行奪法以泄之土中之金四君子湯治脾胃氣虛飲食不進泄痢虛飽此方最良人參白朮茯苓炙甘草土中之金母力不能庇子而子反侵損其母非道也津液暗受其耗剝膚之憂難免土中之水理中湯治虛寒胃痛嘔吐不止泄瀉完穀不化此太陰陽明兩經藥也人參炙甘草乾薑炮各二錢白朮炒四錢右方加附子名附子理中湯治法同土中之水權勢下移橫逆之加理所必有苟奠定之法施之於早而不俾下民昏墊善矣土中之木建中湯治肝虛不能生火以致火不能生土用芍藥之酸甘草之甘此甲己化土也再加肉桂補肝之子益土之母以培其生化之原凡脾胃不和飲食不進其外見證兩脅寒痛泄痢小腹痛此方主之白芍酒炒三錢甘草炙一錢肉桂八分右方加黃耆名黃耆建中湯土中之木是土虛而木來乘之夫臨妻位謂之縱在五邪謂之賊賊者害也夫婦和諧家道可成若怒而相夷室內其能安妥乎土中之火香連丸治脾胃兩經濕火傳變大腸泄痢無度裡急後重黃連一兩木香四錢八分不宜見火土中之火母臨子位順象也然過於炎蒸未免熯其干矣耗津竭液將成頑土設法以救之其可緩乎金中之金瀉白散凡屬肺熱咳嗽當用此加減之桑皮蜜炙地骨皮各一兩甘草炙五分嗽多加桔梗百合痰多加貝母口渴加知母有食加枳實此金自病名曰正邪當另有證候云有食加枳實此語更夾雜金中之水生脈散治暑傷元氣汗出過多倦怠嗜臥此方主之如有虛熱口渴不思飲食輕則合四君重則合補中益氣人參麥門冬各一錢五味子七粒右方如無人參以枸杞代之金中之水是子來犯母謂之逆其證與方不應如是當另補正此方是金中生水也不可云金中之水又人參功力亦非枸杞可代金中之木生金滋水飲凡傷寒熱退後有易補之陰有難動之陽皆當以此養之其見證或汗後煩躁未除口渴微熱大便艱澀小便短赤即是又有一種少陽陽明證手足腫痛此是火燥生風風淫末疾不必俟其汗後亦用此方兼針手足要穴一本改兼針手足要穴六字作加柴芩與之五字無不效者人參麥冬各錢半歸身二錢白芍生地各三錢白朮生用丹皮各一錢甘草三分薑引一方有桑皮金中之木是木臨於金位也木臨金名曰橫當別有證候金中之火黃耆湯凡肺氣大虛腠理不固寒證至矣或小腹隱痛大便不實小便頻數無度終夜不寐盜汗不止命門虛衰精滑夢遺此方通治之其自汗盜汗尤為緊要黃耆炙當歸各三錢棗仁炒白朮各二錢遠志蜜炙一錢補骨脂鹽水炒八分薑棗引金中之火是火來鑠金名曰縱此證之來大是危惡治之不及恐有火炎昆岡玉石俱焚之悔金中之土補中益氣湯凡六經內傷外感及暑月勞倦發熱或汗出不止當用本方加白芍一錢痢疾腹痛已除瀉猶不止是脾氣下陷也加酒炒白芍三錢瘧疾發久形體尩羸無論六經皆當加半夏一錢即有外感不過加黃芩一錢凡婦女胎前氣虛以致胎動不安小産崩漏或産後血虛發熱加酒炒白芍二錢此方凡屬中宮虛損病後失調無不相宜倪氏曰七情內傷脾胃先病治宜補土此方是也人參白朮土炒歸身各一錢黃耆半錢炙甘草三分炙升麻柴胡各五分俱蜜拌炒古方有陳皮金中之土乃母臨子位為順其病別有證治夫尊親饒裕卑幼得以資生若咳者則劇數吐誕沫烏哺誠難矣水中之水六味飲治腎水不足虛火上炎銷鑠真陰變為潮熱咳嗽消渴虛勞等證易曰雨以潤之此方是也熟地山藥山萸肉丹皮茯苓澤瀉水中之水乃自受之正邪水冰地坼寒沍極矣當重溫補得生陽一動春氣潛萌矣水中之木疏肝益腎湯凡胃院痛而大便燥結者肝血虛也此方主之逍遙散所不能愈者此方妙柴胡一錢白芍二錢熟地山藥山萸肉丹皮茯苓澤瀉水中之木乃水中木來賊也其惟腎風或風水乎子來乘母為悖逆無道當另立方治水中之火八味丸凡命門三焦火衰元氣虛憊變為腹痛泄瀉脹滿陽痿精寒不能生子兩膝痠疼腳軟無力眼目昏花悉以此方主之易曰日以暄之此方是也附子肉桂熟地山藥山萸肉丹皮茯苓澤瀉水中之火非自失其職而君火橫乘寡於畏也即真陰不足而龍火飛騰逞其烈也二者方法各異俟補而正之水中之土右歸飲凡命門虛寒等證八味丸治之不效者宜服此方見證已詳八味丸下熟地六兩六錢山藥山萸肉菟絲各二兩二錢補骨脂桂心附子甘草炙各一兩一錢北五味八錢八分一本有枸杞杜仲而少菟絲子補骨脂北五味與此少異水中之土乃水虛其位而土來制之為賊邪也當另立方證倘得少陰見趺陽則為戊癸合化又為吉兆也水中之金左歸飲治腎水枯竭虛火上蒸脾胃陰土受虧以致飲食不進大便燥結甚至三陽癃閉將成噎膈治之以早無不愈也余嘗以此方加歸芍治傷寒舌黑唇焦大渴引飲此必服攻伐寒涼之藥過多也以此方救之瘧疾而兼燥證熱重寒輕者此方更宜熟地枸杞山藥山萸肉茯苓甘草水中之金是母下臨子宮為順名虛邪寒水燥金為病當須溫養方俟補出五臟之病有五五二十五變本出素問玉機真臟論謂風寒入舍於肺為肺痹弗治肺即傳而行之肝為肝痹弗治肝傳之脾為脾風弗治脾傳之腎為疝瘕弗治腎傳之心為瘈此舉風之為病而詳其順傳所勝之次如此舉一氣而其餘五氣可例推矣又素問氣厥論中言五臟六腑寒熱相移之病腎移寒於脾為癰腫少氣脾移寒於肺為癰腫筋攣肝移寒於心為狂隔中心移寒於肺為腫消肺移寒於腎為湧水脾移熱於肝為驚衄肝移熱於心則死心移熱於肺為隔消肝移熱於腎為柔痙腎移熱於脾為虛腸澼死不治是又舉寒熱二氣為病而言其順逆相移之變如此舉二氣而風暑燥濕之四氣可例推矣至謂邪有虛實賊微正五者之分本於秦越人難經之四十九難五十難二章假令心病由中風得之為虛邪傷暑得之為正邪飲食勞倦得之為實邪傷寒得之為微邪中濕得之為賊邪是舉一臟之病而其餘四臟之病可例推矣夫六氣各能為臟腑之病五五二十五變語其常也若盡其變則出於二十有五之外不可終窮蓋以內感七情外緣人事新舊移易正反誤治情形錯雜難以擬議是以上古醫經探微窮奧洞明造化元機詳言病之所由生與其所傳變亦云備矣而初不立方劑詳詔後人其意豈有隱哉良以一定之式不可以應無窮之變焉耳鼓峰選取二十五方以配五臟傳變治法亦是倣佛素問難經中大意將以示後人用藥之徑路非謂二十五方足以治五臟之變證而無所不該也但其所選之某方用以治某臟之變證核其五行生化之理不盡相符念庵議其方論不合殊是至欲另選古方易之而終未得可選以易者則以求其可以分配而確乎不可移易者之誠難也余謂學者當識其分屬之大旨至於審因察脈隨其證而用之分屬此臟變證之方未嘗不可通為彼臟變證之治若僅識其外之情形而不究其內之機運按式以定方譬之刻舟以求劍欲其得心應手而無所失也又烏可得哉傷寒未得汗宜陽脈忌陰脈已得汗反是傷寒初感入於皮毛玄府壅塞氣不得舒無所發泄故臟腑之氣亦拂鬱而生熱也其所為傳裡者由肌肉傳入也肌肉之中有所謂脈絡經絡者皆內達臟腑臟腑之氣血由此而滲潤於肌肉是即井滎俞經原合之經脈也故邪氣由皮毛而肌肉由肌肉而經絡而傳入臟腑是為表傳裡也又素問循經傳者緣足三陽經從頭走足以其相併而行故傳亦易而循經次也其有越經傳者是井滎俞經原合互用交錯之處值一經虛者邪乘之而遷也此是皮腠之氣血與臟腑之氣血交會於肘膝之間井滎俞經等循次而行謂其有互相交錯之處則非也素問所言者常也越經者變也至於由經絡而臟腑如陽明病目痛惡寒身熱鼻乾不得眠此陽明胃經病也傷寒書所謂陽明表證也巳後潮熱自汗譫語發渴痞滿燥實大便堅硬者邪毒傳入胃中胃必大熱津液悉燥胃陰枯而少潤澤之狀此書中所謂正陽明腑病也舉此而三陽可類推矣所謂直入陰經者乃心肝脾肺腎五臟之經受肅殺嚴寒之氣由肌肉間之經絡直逼臟中或心或肝或脾或肺或腎冰冷如鐵氣不能通便成陰證也此時急以熱藥依經通之漸漸溫熱使臟中熱氣得通於肌肉間之經絡也舉此而三陰之證可類推矣傷寒一論千古難詮未許淺見者妄為饒舌至欲弄巧出奇於仲景門牆之外另闢畦徑則誤而又誤矣脈絡經絡之説本於素問井滎原合之詞出於靈樞詳玩本文自有原委若牽作傷寒話頭以欺不學無術之人則可自有學有識者觀之則為東扯西拽之遊談而已夫置標本氣化不論舍太陽大綱不談扭捏陽明在腑在經之分妄言陰證臟冷如鐵之喻寧不懼見笑大方之家耶又謂邪毒入胃試問毒從何處生來謂直入陰經試問陰向哪方直入雜亂無稽之談豫未敢震眩高名隨聲附和按人之五臟至有一臟冰冷如鐵則此臟陽氣己亡恐無再生之望亦恐非草根樹皮之藥所能挽回此語出自名震一時之高手甚覺可駭宜念庵先生起而駁之也傷寒本證及傳變各證極多看準繩自知之此不能備述也其治法不論四時六經但見發熱三四日俱當以逍遙散與之不論四時六經一語謬誤之極後學不可因此致趨徑路發熱三四日太陽證曾罷否與未罷否又三日有少陽證否四日有太陽證否俱不審察總以逍遙散一方投之望其人人痊愈我斷其必無此理如兼食者合小柴胡湯如經發表過多者竟用逍遙散加熟地發表多者外不傷其陽乎內不損其榮乎中不亡其津液乎概置不問而以逍遙散加熟地與之更覺非理兼食者面必擁熱通紅氣粗脈必牢實神志昏沉胸前按之必微痛視其微甚用逍遙散加熟地自四五錢可加至一二兩面擁熱而通紅為拂鬱乎為戴陽乎不問其該解該溫亦總以逍遙方重加熟地治傷寒如此之易無怪乎世醫於岐黃之正典多忽而不講也傷寒發熱必審四時六經至於傳變更有千頭萬緒先賢一一辨晰明徹方法井然豈可以逍遙散小柴胡湯混同施治而欲以概古人許多成法乎且逍遙散乃雜證熱鬱肝脾之劑小柴胡湯乃太陽陷入中土之方焉有不問其陰陽表裡虛實久新而統括以治者能必其一一皆合乎既有不合能保其必不變為敗證而陷人於死乎豫謂人苟未能詳辨傷寒許多傳變只可緘口不言言則必誤若更著書立説流傳世上貽誤後生殺人不少戒之慎之如發熱至九日十日外舌必黑脈必洪數無倫竟用人參一兩熟地一二兩救之甚者加煨薑三片如經攻裡多者輕者四君子湯加歸芍或補中益氣湯大劑與之甚者急用人參一兩附子三錢煨薑三片以發其汗然後仍用四君子湯加歸芍調理凡十一二月傷寒或從畏寒而起者此即感也屬表證前胡湯主之二劑後不應亦當以小柴胡湯加桔枳與之如二劑後再不應仍用逍遙散繼之無不愈也前胡湯前胡柴胡蘇葉半夏桔梗各二錢陳皮一錢白芷八分甘草三分薑棗為引有食加枳實定此方以教後學傳後世是乃誤人耽擱時日也夫邪在皮表可擬麻黃邪在肌腠不妨陽旦因病治病不終劑而解矣即有餘邪再商別法況初感邪未陷入何必柴胡樞轉設或根氣虛人未有不撥其本源而致虛陽浮越者諺云開口奶要吃得好不然誤到底也凡發熱覺脅痛耳聾口乾舌黑此屬邪熱不清也逍遙散加山梔丹皮生地黃連二三劑如不應即屬火燥疏肝益腎湯或歸脾湯加柴胡芍藥有熱甚而痛及頭目手足自覺腫起此火燥生風風淫末疾也滋腎清肝飲加熟地一倍為主禁用寒涼藥發熱脅痛耳聾口乾舌黑固屬邪熱不清內中亦有屬虛證者不可不知若脈見弦大或空數或微小而急疾乃是大虛證法當重劑溫補若一例作邪熱治之必至敗壞想其平日以逍遙散小柴胡湯用之得手故教人亦不論虛實總以此二方為先務不知用此二方以治傷寒雖似穩當實倚殺機世人不覺其誤信手亂用受其害者甚多且發熱證中屬虛者不少非飢飽勞倦即房室憂焦若犯斯證開手即當溫補溫補未效即用大溫大補病者篤信醫者有恆自然陰陽和而榮衛調沛然作解矣若以逍遙散入梔連等滋陰涼降之品二三劑不效遂致脫陷者有矣知其將至脫陷然後改用溫平遷延時日亦多變成敗證至於不救凡大便硬者除合仲景痞滿燥實堅證方可用承氣湯然世甚少太陽證今治傷寒用前法尚有痞滿燥實堅證乎余嘗疑鼓峰先生未曾細觀仲景之書故所論多支離痞滿燥實堅之説乃陶節菴無根之談今以為仲景之論非其一證乎且勿論其是太陽非真太陽如遇粗工發表攻裡過當以致真陰耗竭燥結不出者一味養氣補陰宿物自下須安慰病人勿急於攻下守至數日自可奏效也或有一種不行便而能食者推陳致新倉庫盈溢自能通利不便無憂有不便而不能食者粗工必主便則邪去而膈清才能思食余獨曰不然必須先養胃以助正去邪如養未到邪不即去不食不妨也養氣助正俟其自便是最穩法凡傷寒復發世皆作有餘證治必曰因食而起殊不知有餘不盡之毒留滯陽明胃經也蓋緣戰汗後元氣虧損之甚即以補陰得汗力只及得七八分便住表既得解便能清爽其不盡者復歸陽明加以一二日之飲食與邪相蒸復騰騰而作熱矣曰治之當何如曰舍補正無由也當此之時大汗一出元氣驟虛飲食入胃生化遲緩於是所留之邪與新入之物合而為熱如依時師再用攻邪則元氣愈虛熱邪愈熾索然而死矣惟以大劑六君子湯加當歸投之縱有病愈增而熱愈甚者乃是邪與食為元氣所攻發將出之候也守不過三日復戰而汗解矣若用芩連退邪枳朴消食必死無疑或曰汗至七八分而餘邪何以復歸陽明曰胃主肌肉而元氣薄故也如元氣盛者無此病也如流泊肌肉筋骨則為餘毒治法亦先補正此段所論俱是正理後學確當遵守其所以有一段入理之言即間一段無巴鼻之論不能無雜者良由其説不從軒岐仲景書參出而於節庵準繩中脫化故雖高出時流而不中理之談時一雜見謂有餘不盡之毒此毒字從王叔和序例中用來蓋以為發論之奇而不知用字之欠理謂之邪可也何毒之有胃主肌肉四字用在此處未免落空何不雲陽明居中土為萬物之所歸乎凡直中三陰者理中真武四逆等方辨證用之仲景並無直中之名乃是陶節菴撰出貽誤後人至今習成常語牢不可改如夏日坐涼亭小閣高堂大廈中亦能中寒宜附子理中不可泥於盛夏而禁用熱藥也戴陽者兩顴淺紅必遊移無定處不盡面通紅或煩躁發狂欲飲水坐臥泥水中此陰盛格陽也大劑八味飲或參附湯人參熟地可用至二三兩附子可用至三五錢如認作白虎證而治之立死中暑者面部通紅紫脹眼白必黃更以口渴辨之凡中暑口必渴面赤氣粗煩躁狂亂審知陽明的確方可用白虎湯此數條所論俱是正語後學所當深信不疑傷寒一法惟太陽證用麻黃湯發表一涉口渴則非太陽證矣緣太陽經絡行身之背故有項強頭痛方是表證余則與表無涉麻黃髮表等藥所當禁忌也潔古之九味羌活湯與雙解散俱可廢而不録今真傷寒絶無雖發於嚴寒亦當作內傷治況不發於肅殺之令乎豫立五法以治內傷而熱證無餘義也原汗乃胃中津液也故傷寒書中最要緊關頭在存津液三字至熱鬱於內則津液亡矣何以能助其汗乎一驗其舌胎白如刺此肺病也生脈散加生地白芍當歸黃耆甘草柴胡黃芩以生金滋水一舌胎黑滑此腎氣凌心用八味飲黑燥用六味飲以救腎陰一舌黃胎補中益氣湯加黃芩或黃連以補土生金如有食去黃耆加厚朴白朮不可去且發其汗縱有食不顧也一舌覺轉動不活防其卷也逍遙散加黃芩丹皮生地以滋水生肝一舌鮮紅此心經病也六味飲合生脈散以滋水清火凡內傷外感寒熱之分皆從舌胎顏色為準如黑而滑者乃腎氣凌心用八味飲如枯黑不潤澤者用六味飲其人必兩顴遊紅一劑戰而汗愈如白而加黃黃而加黑此腎凌脾須治中宮如補中益氣之類腎乃北方元武之色故屬黑且火位之下水氣承之水來救母若此時泄火火無從泄助子以救母則仇未有不復者也亢則害承乃制其理昭然如是灰色指甲刮下無渣汁者方是火證乃芩連之對證也若腎氣凌心而用芩連則舌上現出人字紋必死黑而不滑則腎水枯乾當急救其陰也凡烈焰近炙則燔手漸高則漸冷緣冷氣乃火逼所致熱病之舌黑即此理也太陽行身之表是身之背也三陰行身之裡是身之前也少陽則半表半裡譬如該補中宮而邪熱未除補中益氣湯合小柴胡以治其少陽是半表半裡也自論太陽證用麻黃髮表以下八條胡彥庵評本不載世所刊傳已任篇本有之在詳看準繩自知不能備述之下治法不論四時六經之上觀其所謂今真傷寒絶無雖發於嚴寒亦當作內傷治云云知其所論諸條治法與仲景不同者蓋有由矣彥庵據仲景所論者一一糾繩宜其觸處有礙也此八條內亦有可採故補録於後所期後學細心研察分別取之洞徹於中有得於通變化裁之用技也而進乎道矣中風脈宜浮遲忌急數真中風者其病不過在經絡經絡之氣為風所逐則氣逆行氣逆行則臟腑之氣血不能外達故多卒然仆倒不省人事感之輕者半身不遂口眼歪斜及經而止也類中風者其風自內出七情恣縱六淫外侵真陰不守久之水衰火盛風從火出離其故宮飛揚飄逐卒然仆倒故其人兩腎腰胯間及臍下必冰冷如鐵蓋別證必他臟先病緩緩窮到腎經惟中風竟是腎經與命門無形之水火自病故一病竟絶也當其發病之際必有一股虛氣從兩腎中間上夾脊穿崑崙過泥丸直至命門命門為三陰三陽結聚處此股虛氣一衝三陰三陽之氣亦突然而散遂外不省人事而在內臟腑之氣亦隨之而去矣臟腑之氣既去故手撒眼合遺尿聲齁口開等證又相隨而來矣此命門即素問至陰之根結於命門乃兩腎之上下左右各相去一寸其中間便是內經七節之旁中有小心是也丹家謂之元神此股虛氣是即所謂無形之火也緣無形之水虛不能守遂化作冷氣騰空而去真中風者小續命湯其人形體實無類中風證而卒然仆倒者北方有之江南少見類中風者乃大虛也其證卒然仆倒眼合口角歪斜手撒遺尿大抵見一種猶可治數種俱見不治尤當急以手按其少腹冰冷如石者急當灸氣海兼用蒸臍法脈必二三至闊大虛軟如棉花急煎人參一二兩附子一兩或有生者俟其勢定方用人參五錢黃耆二兩附子五錢不數飲之但覺臍下溫和手足運動口眼能動是矣俟飲食如故二便如常大劑補中益氣湯加附子三錢吞八味丸至兩許大抵凡有頭目眩暈難開開即見居室百物如倒轉胸中漾漾噁心欲吐即類中風之漸也治法同上但不必灸藥物足矣此論頗是正解但好奇過甚未免援引支離夫兩間之理惟在切近使人易知易行足矣不必探幽索隱以鳴高也古所謂中風者真中類中脫證三者而已大江以南無真中風其所病者大抵虛風類中耳即有閉證兼見而屬實者不妨略用通關開竅疏氣行痰之劑俾其大勢一定然後審察其證而治之其法大要和其陰陽調其氣血或有兼證隨所現而治之或溫或清或補或散以無失其宜為貴若無閉證總屬於虛辨別其陰陽而重補之可也通泄之藥概不可投若不審而誤用牛黃蘇合後即治得其法亦不免為痼疾之人脫證即內經所謂急虛證也五臟敗絶定無生理若見一二證而不遺尿者用先生所言諸法而速救之亦有生者瘧疾瘧之為病非經非絡非臟非腑乃夏月汗出太多肌表空疏外感暑邪乘虛而直入臟腑募原之間待收藏二令一行玄府閉束則所藏之邪無以泄其怒而寒熱作矣然其寒也乃內熱將作火沖其氣故凜凜然而寒非真寒也故不得以熱藥治之也然素問分六經瘧豈膜原足以盡之歟曰非是之謂也凡臟與臟或腑與腑或臟與腑彼此相接之處中間蓋有虛界之募原而虛界中復有剛柔筋脈其為某臟之筋便為某臟之病譬如胃與小腸相近而邪入於胃與小腸之虛界而彼筋脈屬胃則為陽明經瘧矣如肝與脾相近而邪入於肝脾之虛界而筋脈或屬脾便為太陽經瘧矣開口從汗出太多説起便與經旨相悖不觀內經云夏暑汗不出者秋成風瘧乎至其分疏募原界限聯絡甚為得理按素問謂夏暑汗不出者秋成風瘧見金匱真言論中又謂痎瘧得之夏傷於暑熱氣盛藏於皮膚之內腸胃之外令人汗空疏腠理開因得秋氣汗出遇風雲云又謂夏傷於大暑其汗大出腠理開發因遇夏氣淒滄之水寒藏於腠理皮膚之間秋傷於風則病成矣此二條見瘧論可見致瘧之由政自不一鼓峰所言似本之瘧論彥庵引金匱真言以駁之各據一説皆不能圓備又素問謂先傷暑而致汗以大出腠理開發鼓峰則謂汗出太多肌表空疏致外感暑邪則其説又倒亂與素論相反立言者固應細自檢點究之臟腑雖病皆因募原之氣遷移也至於每日間日間二日者瘧之衛氣日行一周歷五臟六腑十二經之界分每一界分必有其舍舍有隨經絡浮沉內薄之外邪故與日行之衛氣相集則病作離則病休也間日間二日者由其募原之遠近也曰古人言無痰不作瘧信乎痰之所為非熱不生今病人飲食入胃而每日發熱則脾不能守其靜化一惟外邪所化之熱煎熬並飲食而化為痰矣其有先傷飲食而痰熱內作復挾外感之暑邪變而為瘧者有之矣無痰不成瘧凡瘧皆由脾虛此二語乃透瘧病之根醫家不可忽諸瘧疾之原多由夏暑貪涼失其養陽之道至秋正氣欲收而不能入邪氣欲出而不能達是以邪正交爭而瘧作其間有風勝寒勝之不同舍近舍遠之各異內經所論無遺蘊矣治之之法不過和陰陽調經絡有邪去邪無邪養正或溫或散或補或清隨其證之重輕人之虛實而治之何拘拘於痰與食而膠柱於此數法哉瘧初發時治法不論六經內外只用清中祛瘧飲或清脾飲三四發不應以二妙丸與之立除若淹延歲月不愈者一味六君子湯自愈有發在酉時者五發內俱當用香紅飲古人用升提法轉出陽分不過言道理當如是耳時人執此法愈提則陰愈虛矣且凡屬夜病若俱要見陽而愈則亦不勝其升提矣間一日發與每日發者治法不甚相遠惟三日發者最難治余於歲月未久者用參湯下二妙丸服之半月一月自愈如年深月久尩羸不堪者大劑養榮湯吞八味丸仍於湯中加熟附子一錢十劑必愈瘧痞初起三妙丸加鱉甲久服自愈凡有痰有食誤服補藥以致不瘥者用二妙丸立愈或再用小柴胡湯加枳實桔梗二三劑清中祛瘧飲黃芩山楂各一錢柴胡半夏陳皮青皮枳實厚朴蒼朮草果各八分生薑一片為引清脾飲黃芩柴胡半夏青皮厚朴蒼朮草果白朮茯苓炙甘草生薑香紅飲人參炙甘草當歸各二錢香附紅花各半錢生薑一本無甘草用益母草二錢二妙丸橘紅半夏薑製各四兩右為末神麯和丸每於未發前三個時辰許吞一二丸自然不發加白朮名三妙丸經云夏傷於暑秋必痎瘧痎瘧者陰瘧也陰瘧而可用寒涼散泄乎嘗閲李易安金石録後序言其夫趙明誠因途中奔馳冒暑至行在旅邸病痁豫聞信驚怛念渠性素急病痁患熱必服寒涼藥疾可憂遂解舟下一日夜行三百里比至果大服柴胡黃芩瘧且痢遂以不起嗟夫易安一女子耳尚知柴芩不可妄用何世之所謂名醫奉此為治瘧之神劑日事殺人而不覺良可嘆焉痢疾諸痢疾脈流連細小者生浮數洪大者死痢之一證古人咸以赤白分寒熱殊不知傷氣分為白傷血分為赤丹溪謂先水瀉而後膿血為脾傳腎先膿血而後水瀉為腎傳脾此已發前人所未發至損庵以為種種痢疾總由濕熱入胃此一句便可悟病形矣蓋痢疾腹痛必是繞臍以下當小腸之分野飲食入胃挾暑毒而歸於中脘初食未成糟粕後食以繼之則初食挾毒而歸於下脘矣夫中無毒邪則氣血升降得以循其正所食之物變糟粕而從下脘歸小腸若毒與食在下脘則升降不得循其正糟粕欲行而不行然畢竟要行而不得行則將臟腑脂膏逼迫而下逮交入小腸之後膿血由小腸刮下小腸緣無毒而糟粕得循其正故小腸雖曲而順下無礙惟膿血則不得循其正而不肯下故痛在繞臍而下屬胃之下口及小腸也小便不利者小腸為邪毒所逼不能分別故短縮也六氣在天暑則長養人者也不可以毒字加之祗緣見王叔和寒毒字用得奇故是處用之臟腑脂膏非膜絡即募原也乃保護臟腑外通腠理者逼迫而下其人烏能存乎此等奇論不知出自何書良由見理未明故爾認主作賊以長養之正氣而稱之曰毒其源頭先錯自然左支右吾通篇説不清楚矣夫痢疾之原皆由夏日寒涼過度飢飽失節以致中土寒而經脈病及秋陽氣收而所積之寒氣無所容內氣壯者隨經脈外出樞轉而為瘧內氣少弱則隨經脈內陷從總閣而為痢矣色有赤白者感厥陰之氣則赤感太陰之氣則白二氣夾雜則赤白相間而為痢膿血矣苟求其氣化審其陰陽虛實而治之庶無差失有噤口痢乃毒氣原盛或破藥太過損傷上中二脘宗氣邪毒乘虛而上逆也有不從暑毒而得者或食浮瓜沉李或臥高室大廈皆由寒得隨感隨發病止在下脘寒氣所乘脾亦不運故為痢如逾二三日寒化為熱其病形亦與暑毒同也內經只有始為熱中末傳寒中之説若寒化為熱之言乃傷寒初則病本氣而為寒繼則病標陽而為熱非所論於雜證也或者張劉而下諸先輩有此論與軒經相悖不敢隨聲附和凡痢疾初起三日內皆可用白芍藥湯立除若初起但覺腹痛水瀉無度厚朴湯主之一見紅白毒勢凝結矣但當解毒和氣養血切莫破氣行血是為大法調金湯主之如服調金湯後紅白減而漸見糞色便當減芩連分數芩用一錢猶可連須漸減加人參矣此宜相機以消息之紅白盡除用六君子湯加歸芍調理如初起發熱此熱病也竟以調金湯加柴胡與之初熱只用黃芩熱甚方用黃連此則必視其熱之淺深色之紅白而分別用之初起即發熱非肌表有邪即經絡不和溫散而調榮衛外邪一解痢亦鬆去若概以為熱病而開手即用寒涼多有陷入而變為難治者久痢能食六君於湯加歸芍久痢發熱不能食肌肉減者不治白芍藥湯治熱痢便血後重經曰溲而便膿血此氣行而血止也行血則便膿自愈調氣則後重自除白芍當歸各二錢大黃生用黃芩檳榔各一錢黃連八分肉桂五分磨木香甘草各三分厚朴湯厚朴枳實黃芩檳榔澤瀉各一錢青皮八分甘草三分調金湯黃芩黃連丹皮檳榔澤瀉厚朴神麯各一錢當歸芍藥陳皮各二錢生薑片為引呂先生治痢澤瀉湯白芍二錢當歸黃芩澤瀉甘草楂肉丹皮各一錢木香四分滑石二錢青皮厚朴各八分如紅積加黃連八分或一錢至錢五分如鮮血加生地三錢如初起毒盛便難人壯實者加酒製大黃二三錢如身體發熱加柴胡八分或一錢痢之為患皆由夏暑失其長養之道以致中土寒而經脈病及秋天氣降陽氣入則所積之寒與經脈之病相因而欲陷再加飲食不節勞力過度而痢從茲作矣今以此數方為治痢之能事其於壯實者雖用硝黃承氣上承下滌亦可應手而解何憚此降泄之品苟其人挾虛而本元虧弱或恣縱寒涼而中胃虛冷一概用此未有不變為冰脫者也二君所定之方皆對待暑熱之劑一例寒涼通泄而無挽轉之法夫不究其本不審其因不問其中土虛寒不別其經脈內陷而欲立法定方以為後人楷模後人信之不問虛實一往混施以致夭札蒼生作俑者烏得不受其責鼓證鼓即腫滿也不論五臟六腑新久虛實一味補中益氣湯盡之但有鬱而成者和中丸為妙即腫初起亦可舍是而別有方法吾不信也又有一種寒水侮土者其腫必先頭面四肢起然後及於腹中惟此證可以補中益氣湯吞金匱加減腎氣丸然當治之於早不然水勢沖中土崩岸敗無濟於事矣又有一種食鼓者乃是飲食所傷初起必先雀目起翳醫家不識只治眼目不知乃是鼓之根也此時急當用清劑以治之經云開鬼門潔淨府去宛陳莝是也然古方太峻今定一保中丸久服自愈和中丸人參三兩白朮三兩陳皮木瓜去穰乾薑甘草各一兩右為末蒸餅丸食前白湯下三五十丸金匱加減腎氣丸治脾腎虛寒腰重腳腫濕飲留積小便不利或肚腹滿脹四肢浮腫氣喘痰甚或已成水證其效如神熟地四兩掐碎酒拌杵膏茯苓三兩澤瀉山藥山萸肉丹皮肉桂各一兩附子五錢牛膝車前各一兩右為末和熟地膏煉蜜為丸桐子大每服七八十丸空心米飲下保中丸蘿蔔子炒半夏薑汁製厚朴薑汁炒枳實麩炒黃芩酒炒山楂廣陳皮蒼朮米泔浸炒蓬朮各等分神麯和丸一本有三稜無山楂鼓是脹滿通身腫為腫滿不可混當分別之然鼓只單腹脹初覺即投溫補或可望全不則萬無生理總之腫脹屬實者易治挾虛則難矣至若足趺久腫漸而上入腹者亦屬敗證不治補中益氣於趺腫時用則驗若腫至腹則無及矣鬲證鬲之為病一陽明盡之矣丹溪謂噎鬲反胃之病由得之六淫七情遂有火熱炎上之化多升少降津液不布血液衰耗胃脘乾枯其稿在上近咽之下水飲可行食物難入入亦不多名之曰噎其稿在下與胃相近食雖可入難盡入胃入即吐出名之曰鬲總緣下脘與厥陰少陰相逼七情用事肝膽先病病則鬱而生熱熱則其氣熏蒸於胃久之胃中陰血亦干而漸致糟粕不能受氣化之推移積疊於胃底於是胃中之氣上逆而為火中脘為火所盤據竟不思食矣其津液不能下行則小腸下之闌門亦致枯稿小腸手太陽也閉則生火愈干則愈熱愈熱則愈干亦不能司其泌別矣然後膀胱無所稟受而小便赤濁大腸無所稟受而便若羊矢成不治之證矣鬲證以一陽明盡之此種高談不知本於何書至謂熏蒸於胃之氣又不知認其氣為何物若謂熏蒸於胃之火則此火乃三焦之火三焦根於右腎而為元氣之別使所以腐熟水穀而上為開發下為泌別者也豈有反使胃中血耗而糟粕不能移動之理內經謂少火生氣壯火散氣火之美惡須要辨得極分明若於此不加分別混雜言之以致後學不明此理習用寒涼有加無已至於生氣之火而亦思盡力清解致成敗證往往有之此皆立言不善者之過也總之胃為多氣多血之海人見其不思飲食便為胃氣之虛而用參耆白朮以補之見其食即嘔吐便為胃中之寒而用薑桂茱萸以暖之殊不知腸胃之為物最是潤澤試以羊豕之肚觀之必是滑膩稠黏如液如脂如膏如津在人胃亦如之所謂陰也鬲證之人其腸胃必枯稿乾燥絶無滑膩稠黏等象是胃陰亡也陰亡地氣絶也地氣絶則天氣從何處得生乎故多死用溫補不合法致與病機不相中非溫補之過也先生管中窺豹祗見一斑而竟以是立言傳世致使後人禁用溫補為利少而為害多矣鬲證與翻胃何以辨之鬲證飢欲得食但噎塞迎逆於咽喉胸膈之間在胃口之上未曾入胃即帶痰涎而出若一入胃無不消化不復出矣惟男子年高者有之故曰少無噎鬲翻胃者飲食倍常盡入於胃矣但朝食暮吐暮食朝吐或一兩時而吐或積至一日夜而吐腹中脹悶不可忍而復吐出原物酸臭不化此已入胃而反出故曰翻胃男女老少皆有之世醫治鬲或以胃虛而用溫補或以開鬱而用香燥等劑必至死而後已殊不知關門枯稿腎水不能上達經云腎者胃之關關門不利升降息矣關門即氣交之中天之樞也故腎旺則胃陰充足胃陰充足則思食當用六味加歸芍養之或血燥大腸枯乾有黑糞積疊胃底則當以熟地五錢當歸麻仁各三錢白芍桃仁各二錢微微潤之視其形體如常氣血充足即於前方內加大黃一二錢以助血藥大腸一潤利而胃自開矣一開之後大劑六味左歸等類不數數飲之方有濟也脈必至數勻調其形體則微大而弦胸中有此數方作主故援內經以證其是耳然此等溫平之劑病微者可以奏效劇者恐不能勝其任也有一種大便甚利而且溏每食必吐是名翻胃王太僕曰食久反出是無火也八味丸主之此證全在大便上驗如一干結便非無火一味滋潤如前法膈證一條古今方論繁多而治之得其效者甚少余甚憫其罹是患而莫之能救也每有一書出於是證必留意參考探微索隱數十年未嘗見有妙論奇方得以起痼扶危而超然獨擅其藝者出而應世亦嘗治效十餘人乃問諸心曲終未敢自以為得其要領也先生夙以奇論鳴世而治疾又獨擅其奇宜其於是證必有創出之論超人意表者及觀其書甚不合於軒岐仲景之正論其所列之方究不越河間丹溪之範圍所謂趨小而遺大得一而廢百烏足為定法哉夫內經止有三陽結謂之鬲與一陽發病其傳為鬲之論而未嘗有陽明病鬲之詞夫三陽者天為業業而為天則其至尊無對而為最清純陽之氣可知且天統萬物陽氣流行故三陽升於泉下而出於中土上膈而外達於皮毛復從皮毛內合肺下膈而入於淵泉往來升降無一息之暫停一如天體之周流自上而下自下而上循行三百六十五度而無息也結而為病則升降之機幾於息矣其病豈不重乎至若一陽者少陽也出於水中而根於命門乃生陽之本真火之源也天無此火不能燥物人無此火不能生活通元真於肌腠將榮衛而並行下約膀胱而泌別其津液上蒸胃腑而腐熟其水穀古人稱三焦為釜底之然良有謂也若夫甲膽亦為一陽秉春生之氣而十一臟皆取決焉則其於人身亦非細也乃發病而傳為鬲又豈輕淺之證乎苟不知三陽一陽之氣化而懵懵以治鮮有不擯於危亡者先生之論乃以一陽明盡之談何易耶夫陽明者二陽也靈素並無為鬲之論先賢亦無病鬲之辭而先生新創之不過謂燥結枯稿若二陽之氣化使然而遂以一陽明概之所謂泥其形似而昧其神化執其一節而忘其大體者也殊不知太陽氣化失調則陽氣不克出入於膈中而津液不能遊行於外內三焦運行失職則生陽乖升降之機而水穀愆蒸腐之力於是陽氣蓄積上下阻絶津液稿干飲食難入結而為噎為鬲矣於斯時也將以寒涼承其亢乎抑以陰冷折其熱乎將以膏膩潤其燥乎抑以辛烈開其結乎將以毒藥攻之乎抑以正藥養之乎其法彌多其治彌拙蓋此證雖不外於六淫七情或由外入或自內召然其氣化神機為病終不容形像摹擬自非心通靈素洞悉氣機不遺毫髮者所能治也設已知生陽之不可逆機神之不可違而執持兩端多方顧忌傍論雜遝畏首畏尾稍用重劑復行監製此雖有識而無力亦不能治也或曰然則病此者究無法以治之乎曰非無法也惟其心空太虛目無全牛勇如賁育膽若薑維線索在手神應無方者庶幾近之至若信任不專朝秦暮越一齊衆楚難於理折宵小在傍乘微伺隙狎昵盈前妖姬侍側半匕未投便生異説逞厥性情恣其叨餐縱進良言漫無關涉才見小瘳即思改轍重財輕命初恭後褻求巫則欣見醫則戚我具熱腸彼如冰鐵攖斯篤證猶然慢易如此之人治亦無益更若真陽已敗浮熱奔馳謬誤既久神氣已漓縱遇和扁妙術難施惟在未甚之先早為覺察看破身心屏絶世事一切經營皆為棄置篤信師言確依指示如此則醫得以擅其良盡其技洞晰陰陽分別同異一意扶陽漸闢陰翳朝斯夕斯無間晨夜任其火炎聽其熱熾莫惑旁言毋生變志倏爾云開煥然光霽一旦欣欣都成和煦如斯治疾方稱進乎技矣閲鼓峰所論列未嘗本靈素之正義而只為模糊影響之詞雖廣為譬喻曲引萬端總不外前人糟粕之餘即有可以節取之處亦得半失半後人若奉之以為規矩準繩恐存濟世仁心者終無裨實用焉耳吞酸凡是吞酸盡屬肝木曲直作酸也河間主熱東垣主寒畢竟東垣言其因河間言其化也蓋寒則陽氣不舒氣不舒則鬱而為熱熱則酸矣然亦有不因寒而酸者盡是木氣鬱甚薰蒸濕土而成也或吞酸或吐酸也又有飲食太過胃脘填塞脾氣不運而酸者是拂鬱之極濕熱蒸變如酒缸太熱則酸也然總是木氣所致若非木氣即寒即熱即飽即拂鬱亦不酸以酸為木氣也曰胃與肝膽其分野若何而能令種種作酸曰少陽與陽明經相併而行肝並於胃故胃熱則少陽相火與厥陰之火皆由外相引而薰蒸也至於七情之郁輕者本氣太盛侵犯土位重者真水枯涸腎氣奔逆載水上浮荊棘橫施濕土渾濁不由於寒不由於熱而吞吐皆酸此又河間東垣因熱因寒之説所不及也又有一種飲食入胃即成酸味此必傷寒久瘧胃陰未復水穀入胃增其濕熱而成酸者當必以淡泊滋味養其真陰才可復也吞酸吐酸固有寒熱之異必竟寒證多而熱證少若專泥作熱治恐失手者反居大半也傷寒久瘧之後真火無餘胃陽己竭重溫峻補而慎其飲食何酸之有全篇廣引曲喻大概證為濕熱之證而不可不用寒涼耳寧不知中土受傷與生陽之氣不能蒸運者居多耶重用溫補使根氣充實則木自調達而酸水不作矣若必欲治標而不顧其本則中滿腹脹泄瀉水腫噎隔等證且見不旋踵而至矣眩暈眩暈之病悉屬肝脾二經風火風火屬陽陽主動故目眩轉而頭暈譬之火焰得風則旋轉不已也緣手少陽之支從耳後出走目鋭眥而交於足少陽足少陽之支從跗上入大指爪甲出三毛而交於足厥陰經云五臟六腑之精氣皆上注於目而為之精裹擷筋骨氣血之精與脈併為目系上屬於腦後出項中故邪中於項因逢其身之虛其入深則隨目系以入於腦入於腦則腦轉腦轉則引目系急目系急則目眩而轉矣所謂邪者總風寒濕熱內外之諸邪也然則何為而屬於肝膽蓋五臟六腑之精氣上注於目是必循筋脈而才能上注肝主筋肝有風火則筋病而上注者壅而不行所謂目系者因風火而澡燥則收引而急急則目眩此一説也又膽經之脈起於目鋭眥童子髎穴終足厥陰厥陰當是竅陰之訛故膽經風火亦致掉眩故經云諸風掉眩悉屬於木也又有太陽之氣標在於顛入絡於腦又膀胱穴自睛明出至陰於足外故寒水之氣太過凌逼真火亦眩僕也又有心下有支飲其人苦眩冒是格心火不行而上衝頭目也又有風寒相薄食谷即眩是內受濕飲之郁而不足之微陽與所郁之熱並而上衝於頭目為眩也晴明穴屬陽明又陽明支者入目內眥故眩也又有陰虛之人常若眩冒目中見火如星此胸膈必有痰故發暈時眼不可開開即所見之物非倒即斜則土虛之發也其眩暈不能起必見噁心嘔吐而心煩熱又有腎陰不足三陽之焰震耀於當前中土虛衰下逆之光上薄於顛頂此則似乎不關肝膽兩經不知其始也各有所因其終也不能不由其所從歷之途而見端於極也則仍謂之悉屬於木可也所列諸證皆繫有余標病即內經所云狗蒙招尤目冥耳聾過在足少陽厥陰似屬風火為災苟非不足而治得其法或清或解可不終劑而愈者也假使腎虛而心火上炎肝虧而虛風內動脾虛而水飲內停心虛而浮陽不斂肺失其治節而宗氣不能上注於耳目衝任失其守而血液不克上濡於空竅俱能為眩暈之病須當究其因而補之溫之若不應則當大溫大補以救之然須以漸而投亦不能才飲數劑而即可望其見效也若作有餘而以辛散降泄之品治之未有不日醫日甚而為入臟不治之證者咳嗽脈宜浮軟忌堅急弦小咳嗽之證屬肺經然有本經之咳嗽有各贓腑遷移之咳嗽本經之咳嗽外感者皮毛受之玄府閉矣玄府閉則肺氣不舒其在中之二十四竅所以列行分布諸臟之氣者亦不能行於是肺滿而逆戛戛然咳嗽矣此肺實也肺虛者由脾土不能生化津液不能上布則肺失所養而陰虛陰虛則肺熱肺熱則上焰火扇其竅時為翕張亦多嗽矣此肺虛也獨有心火刑金與水中之火直奔西極而銷鑠煎熬則肺便危矣緣肺為華蓋以覆諸臟其二十四空竅虛如蜂窩下垂無透竅吸之則滿呼之則虛最喜清涼不耐煩熱今心肝脾腎四臟之火勢上炎則隨所吸之氣而入於竅中肺不受熱則戛戛然而嗽甚至肺瓣乾枯形如經霜荷葉委頓零落而不能振舉水精亦不能四布五經亦不能並行而成肺敗之證總緣肺之竅中只受得臟腑中固有之元氣以運用乎一身受不得一分邪氣耳初起者金沸草散主之年壯力盛即久亦可用如每月一二發弱證之漸也六君子湯以補土生金六味丸以滋水養金此攻補二法也如咸哮醋哮勝金丸極妙時嗽嗽則涕淚出一味瀉白散加黃芩桔梗寒嗽無痰或即有痰必是稀涎少食一味瀉白散加桔梗薑棗甚則六君子加薑棗風嗽必絆牽有痰金沸草散自時嗽嗽則涕淚出以下六十字楊本所無金沸草散金沸草二錢麻黃去根節炒前胡荊芥穗黃芩各一錢甘草五分生薑三片大棗二枚勝金丸三稜醋炒莪朮醋炒高良薑人參陳皮黃連酒炒各三錢右神麯和丸梧子大每服七十丸空心白滾湯下觀內經飲入於胃遊溢上歸之論則知津液之通調於臟腑而化氣者皆肺之治節為之也又觀谷入於胃傳之於肺之説則知臟腑內外之血氣亦肺之流溢布散也夫五臟六腑內外之津液血氣雖由胃腑水穀之所化靡不藉肺氣以傳布故肺位獨處其高以行營衛陰陽也咳雖肺病而五臟六腑皆能致之善治之者治其五臟六腑或補或溫或通或塞隨其因而調之自然咳止肺寧而其法得矣若沾沾唯肺是求譬猶長安在西而向東指不其惑乎又皮毛者肺之合也六氣外客皮毛先受而肺即為之不舒於是咳作是推驅其客感使皮腠宣通於外則肺臟自清寧於內不勞餘力而咳止矣設起手即用寒涼致玄府閉塞肺氣冰伏氣化不和於外神機不轉於內傳而為癆瘵難起之證此非病氣之害乃醫者所作之孽也至若所言肺虛由於脾土不能生化肺金失其所養則是地天不交也地天不交則諸臟腑皆無所取給斯時惟有重投溫補使資生之本充足庶幾仍可交濟豈可云陰虛火炎而再以涼降治之至於土崩水敗而後已耶又云心火刑金與水中之火直奔西極夫君火炎亢一劑承製暑退而生化依然若水中之火乃雷龍之火也惟有求其屬而從治之則應手而愈若行對待而直折之則火愈熾而銷鑠熬煎之患不免矣又云五臟之火沸騰以至肺瓣乾枯如經霜荷葉委頓零落夫焦稿至此垂死必矣奚止為肺敗之證乎若云最喜清涼此説恐非確論蓋肺雖為清虛之府然必藉胃中陽氣溫養若中焦不能如漚之蒸運則上焦焉能如霧之通調觀內經形寒飲冷則傷肺與肺惡寒之説自可知矣苟執膚見以為是而恣意寒涼則胃陽日見其消乏生機必至於蕩然馴致癆瘵而不可救藥皆由執偏見逞臆説之醫誤之也如年高筋骨作痛氣喘有痰腰痛用熟地山藥當歸白芍杜仲枸杞黃耆棗仁麥冬五味甘草喘盛去黃耆如年高痰喘氣不歸原者生脈散加熟地山藥當歸枸杞牛膝菟絲等治之此一條胡本不録採楊本補入怔忡怔忡心血少也其源起於腎水不足不能上升以致心火不能下降大劑歸脾湯去木香加麥冬五味枸杞白芍吞都氣丸如怔忡而實挾包絡一種有餘之火兼痰者則加生地黃連川貝之類清之怔忡證雖緣心血不足然亦有胃絡不能上通者有脾脈不能入心者有宗氣虛而虛里穴動者有水氣凌心者有奔豚上乘者治法略同惟水氣與奔豚有別耳血證吐血世皆知火證便以寒涼濕潤之劑投之土死金衰木勢轉熾疾反劇矣除是瘀血抑蓄折土而奔注與傷寒變熱迫竅而出者余俱當以大劑參耆回其氣氣回則血循經絡矣待稍定即以重料六味左歸等飲於水中養木亦須加人參使氣自陰生也瘀血而吐必先胸痛四物湯加桃仁大黃丹皮香附以行之後用六君子湯加當歸以調之傷寒失血必驟湧出然傷寒大抵從鼻來者多來而即住者不藥可望愈一來不止者不治其餘俱屬七情飢飽勞力等因必見噁心一味固元湯主之傷寒動血苟邪因血解自可勿藥有喜若所出不暢則邪仍不解發表何疑設驟然大出藥不能止則危證也須重劑參耆薑附以救其脫或可保全其餘吐血證亦如衄血法治之可也倪漱山曰七情內傷脾胃先病固元之後即繼以補中益氣歸脾等飲寒涼斷不可用若治以童便秋石等工之粗而庸甚者也固元湯人參黃耆各五錢當歸白芍酒洗炒各三錢甘草二錢炙煨薑一大片大棗二枚吐血一證其所因表裡不同虛實各異審察少差為害匪小所謂毫釐之差千里之謬者也若醫人於此不辨因證死守古法專尚寒涼直折未有不延久而成癆瘵不治之證者先生痛掃其習專固元本誠發前人所未發後學當奉之以為典型然而補既可用溫豈不宜虛而挾寒併火衰脈微及豁大無根者不妨配入薑附如畏其僣亢佐之以熟地可也消證脈宜數大忌虛小三消之病一原於心火熾炎火甚於上為膈膜之消甚於中為腸胃之消甚於下為膏液之消甚於外為肌肉之消上甚不已則消及於肺中甚不已則消及於脾下甚不已則消及於肝腎外甚不已則消及於筋骨四臟皆消甚則其心始自焚而死矣然其病之始也皆由不節嗜欲不慎喜怒膏粱煿炙酒酪湩乳濕熱之氣浸淫燔灼郁成燥熱氣不宜平故其傳變之形為飲水多而小便多曰消渴胃中津液乾枯不能上榮舌本也為善飢多食而渴小便數而消瘦曰消中胃中熱極所入水穀隨火而化也為渴而飲水不絶腿消瘦而小便有脂液曰腎消是燥熱並及於胃底大小腸故脂液凝濁清陽與濁陰不能分疏也三消之中上中可治下消最難治然飲一未至溲二猶可治如飲一溲二不可治矣又三消久而小便不臭反作甘氣在溺桶中湧沸其病為重更有浮在溺面如豬脂油濺在桶邊如柏燭淚此精不禁而真元竭矣何以甘氣為重大抵水在天地與人身皆有鹽有甘甘為生氣鹽為死氣小便本鹽而反甘是生氣泄也是脾氣下陷入於腎也土剋水故死也甘為生氣鹽為死氣此二言蓋欲為奇創之論卻於物理全未參核夫五液之在人身皆腎所主故汗與涕淚及痰其味皆咸其誕唾與乳悉淡而甘以脾開竅於口而乳乃胃中初釀之汁所謂玄酒味方淡可取以譬也若小便乃三焦約膀胱之津液而下注味獨加鹽如海納百川而水味更鹽其理一也若以鹽為死氣則身中之汗涕淚痰皆為死液乎非通論也小便常鹽今變為甘則水已敗而土味下泄矣此先後天真氣已絶而為克賊之證不死奚為末後二語乃是正論趙養葵曰人之水火得其平氣血得其養何消之有其間調養失宜水火偏勝津液枯稿以致龍雷之火上炎熱煎既久腸胃同消五臟乾稿令人四肢消瘦精神倦怠故治之之法無分上中下先治腎為急惟六味八味及加減八味隨證而服降其心火滋其腎水則渴自止矣內有桂附之辛熱壯其少火灶底加薪枯籠蒸溽禾穗得雨生意維新論消證專以心火熾盛延而為上中下內外五臟之消蓋舉內經心移熱於肺傳為鬲消之一端而發是但知熱之為病而不知其心移寒於肺為肺消靈樞論心肺肝脾腎脈微小皆為消又五變篇及本氣篇言五臟脆者與五臟柔弱者皆善病消疸易傷於邪則知消之一證屬虛寒者亦不少也奈後人悉言其熱而置虛寒於不講所以患是病而不愈者比比人能即靈素之理而研窮之於陰陽虛實之間細為分剖其實與熱者可用古人治法其虛與寒者為補為溫覺之於早而用藥得當烏在其不能愈耶趙氏以六味八味專主水火津液之源誠為探本之論然亦在治之於早而大劑以進或全料或半料再入參兩許審其陰陽而用之庶可漸臻其效也弱證陰虛陽虛者此虛為勞即今所謂怯弱證也雖有五臟之別然皆起於心脾脈必數而有浮大細小之別浮大而數陰虛甚也細小而數陰中之陽絶矣此等證必見咳嗽或吐血或遺精或女子不月或諸般勞傷而起要當治之於始婦人産後最易成此證慎之慎之細小而數陰中之陽絶矣此語非大有見識大明脈理者不能道誠與仲景少陰篇中脈細沉數乃腎氣虛少而君火虛陷之意符合今之患怯弱者得是脈居多奈時師悉以為陰虛而用寒涼降潤之品未曾濟得半點腎水而君火已日衰日熄矣或遇有見之醫欲投溫補以挽救而猶造蜚語以誣謗之如此設心其不肖為何如也治弱之法只一歸脾湯去木香加麥冬五味白芍吞六味丸此外別無治法有一種鬱而起者即以加味歸脾外再加丹皮山梔曾經庸醫用寒涼者不可復服又有一種陽虛者脈不數但緩而大不收奄奄無力夜臥不安夢中嘗見鬼神不吉醒來胸中戰跳不寧或下見遺精口中無味飲食不思略食即飽此皆命門虛損心火衰息以致脾土不運生氣不旺大劑養榮湯加附子吞八味丸陽虛一段所論極確盧張復起不易斯言矣霍亂脈宜浮洪忌微遲有濕霍亂腹痛而上吐下瀉者是也藿香散主之有乾霍亂俗名斑痧又名攪腸痧不吐不瀉面色青冷腹中絞痛乃是陰陽錯亂最惡之候而最易治急刺委中部分出血用明礬末調飲探吐或用陰陽鹽湯或用菜油探吐兼用碗刮背上或用苧麻根皮蘸清菜油刮奪命穴督脈後頂天庭等處後服砂仁細末數口連噯數十聲即愈如遍身有斑點見者即用油紙捻火粹之以爆響為度或用蕎麥湯飲之俱妙然其要在急刺委中出血則不死藿香散藿香蒼朮陳皮各八分半夏茯苓各一錢甘草三分一本有厚朴無甘草乾霍亂救急諸法皆可用近時以鹽擦背脊亦佳用來復丹以陰陽湯磨服更妙傷風傷風發熱者蘇葉飲主之蘇葉飲蘇葉前胡各一錢乾葛錢半半夏黃芩薄荷各八分甘草三分如咳者合瀉白散各錢半今人以傷風是輕淺證多忽略之不問其所因與所兼之證亦不察其脈之是虛是實隨手發散動徹寒涼故因傷風而變成癆瘵者往往有之胃脘痛脈宜浮滑忌短澀胃脘痛即俗所謂心痛也心不可痛痛則立死以心在胃脘之前故誤指胃痛為心痛也胃脘痛有食痰死血氣寒火中氣虛之別方書載列甚明無甚深微獨有一種肝膽之火移入於胃而熱又肝藏血血少則肝葉脹硬不肯下垂將葉抵胃胃受肝抵得食則滿愈與肝相逼隱隱而痛者久之變成燥證而為隔證矣又有一種胃中作酸不覺其為酸每進飲食不敢多用多用則竟日悶痛直待食過方得稍舒此痛是胃中一味酸熱也若得噯一口氣亦覺少舒然最難得者噯也若噯得重此自下轉上必有一口食氣或水或挾物是酸者其下最難得泄氣並且便硬此皆少陽厥陰二臟之氣所為也久之亦防其變痞隔中滿等證又有一種胃脘痛是陰虛證將成須認明白二陽之病發心脾此類可通食痛者胸膈按之痛甚勺水不入兼大便閉聞穀氣則欲吐用二陳湯或平胃散加桔梗枳實主之痰痛者亦不思食口即欲食而不能食大便不閉二陳湯加枳殼黃芩海石主之死血痛者胸膈刺痛而食可進四物湯加大黃桃仁紅花主之胃脘虛痛者得食痛止食多又痛食過又痛理中湯主之此皆易明也獨有一種肝血燥痛人多不察亦不思食交陰分外按之不熱病人自言熱口渴者是也逍遙散加生地丹皮炒山梔甚者六味丸加柴胡歸芍主之又有蟲痛者亦不食然痛必時發時止痛則牽引手臂或肩背上俱如穿透不可當必唇紅面上有白點是也痛時不欲食痛才止即可食實者化蟲丸主之虛者六味丸加川黃連胡黃連蘆薈青黛川楝子隨證加減治之化蟲丸蕪荑鶴蝨雷丸蘆薈胡黃連莪朮京三稜史君子各三錢神麯糊為丸心胃之痛內經有五臟厥氣之所客三陰三陽經脈之所侵以及五運之郁發皆能致其病究其源總屬陰寒不足之證也蓋心為陽中之太陽胃陽乃一身之取給厥氣客之當急於溫散而無使傷其氣化又心為君主而主脈胃為經脈資生之本故凡經脈之相干當急和調其陰陽血氣而使之各循其度數運氣之郁發由於不及之年政令遏而不伸及得展布而未暢不免疾患之生惟有順其機而建其神不可直折也且人身之所當重者不過氣化神機與經脈之流行而已苟能分析其故則於痰食血氣等之九種與他傍雜之證可不勞辨別到手自明矣至於苦寒破泄之劑非稟賦壯盛而證屬實熱者慎勿輕試癇證癇證種類雖多然其原總屬於厥陰心包絡火病也大概宜以清心散主之但要久服則有效耳清心散青黛川黃連生地黃赤芍藥殭蠶木通辰砂飛淨研琥珀另研各等分癇證陰多陽少虛多實少法當溫補而寧神鎮心佐以消痰順氣再加以灸法漸可見效此方乃治火盛痰實者若以為癇證總括之品恐非確論婦人胎前凡受孕二三月內必嘔吐噁心此月水不通陽明壅盛故不安食但此是始膏始凝始衃之時驟然壅盛故耳逮四五月則血漸蔭胎兒形體成便具五行生剋循環之理血有所歸而不壅盛矣或曰血壅盛何獨於胃有病曰胃為多氣多血之海五臟之母也女子應有是生應有是化今不行而成孕驟然不化陽明氣血俱盛遂有是上僣之勢久之自平不足慮也然有微甚微者飲食調理甚者六君子湯加砂仁生薑以和之或曰半夏損胎可信乎曰獨食半夏一味雖非胎亦能損人若與參術同用但著開胃健脾之功耳曰思食何為曰胃氣盛則思食血壅則氣逆氣逆則食入反出也或女子性氣褊急者於六君子湯中少佐黃芩以清火消息用之調治胎前嘔吐無出此方如原有胃脘痛而此時夾發加丹皮山梔如發熱不必加退熱藥只以此方調之胎前下血名曰漏胎氣不攝血也多服補中益氣湯其惱怒傷肝肝木賊土血不能藏致成漏胎者加味逍遙散加生地胎前不安血不養胎也四物湯去川芎即用亦不過五分加白朮杜仲有肝旺而動者必痛無定處歸芍生地黃芩白朮甘草如氣虛者必怠惰嗜臥脈必豁大而緩補中益氣湯加酒炒白芍墮胎即俗所謂小産也總屬氣虛血虛及縱欲嗜酒而來醫家動云熱則流動胎火逼迫殊不知氣血調和胎火何由而生豈胎不屬母身別有一種耶寒涼雜投利氣行血卒致隕墮豈非醫害之乎既墮之後猶不禁忌至復有娠前以是月墮後復及期而來矣不申補救止作火治以致三胎四胎逢期必墮烏能有濟余每於未墮之前大料黃耆丸預補之將墮之際大料補中益氣湯加酒炒白芍勿論其脈勿論其證勿論其時一概峻補中宮母氣萬無一失即先賢有一經配一月以補其經者是亦昧於陰陽之理不足信也此條誠不磨之論專門産科恐未能明悉此義蓋由祖父相傳祗此印板治法未嘗留心古學而講求夫通變化裁之活用執定寒涼為安胎之要藥婦女受其害者不少重耳不重目者當三復斯言子腫子懸子嗽子瀉小便不通俱當用補中益氣湯有因胎火盛而致此數種病者用四物湯去川芎加黃芩白朮茯苓甘草以和之獨子瀉挾火宜四君子湯加黃芩砂仁胎前傷寒瘧痢悉以固胎為主傷寒依平時傷寒治自不損胎但當倍用歸芍耳或當用參須平時預先料理獨前胡湯與半夏白芷不可用若小柴胡有人參者即用半夏亦不妨矣瘧疾亦與平時不甚異但清中驅瘧飲去蒼朮山楂枳實余俱如法大抵黃芩為胎前瘧中要藥總當視病人之盛衰而消息之胎前諸方論皆切近正理儘可取法惟傷寒瘧疾治法雖不異於平時然小柴胡清中驅瘧等劑亦須因證審用婦人産後臨盆之時專賴氣血旺足然後能生此時惟有多用參耆歸桂甘溫重補兒信一下頻頻服之自無橫生逆産胎衣不下之病矣有不耐藥氣者獨參湯妙服法於未産下時用芎歸參耆濃煎飲之自然緊痛易産矣兒下後即用前藥加肉桂一錢煎服自無血塊痛之病矣庸陋産科每言産後不宜服參恐將惡露補定世人奉為至言家喻戶習牢不可破誠可為扼腕嘆息者也更可怪者竹林寺僧以削髮披緇之輩而從事婦女産科一門已違如來大戒一到病家更有各樣醜態入中人之室則傍若無人登貴人之堂則趨奉盡禮開口即掃前醫用補之誤而投以巴霜丸子不知産後大虛積漸溫補機候未能即到不無身熱煩滿倘再得數劑自爾渙然以解無如病家聾瞶急於求愈信任髠徒重費抬來惑彼狂言甘心信服患者日進補藥未能見效巴丸到腹便覺腸中鳴動即欲大便便後胸腹頓覺寬爽神清竟認之為靈丹妙藥矣由是而彼得以肆其鹵莽之説目高氣楊迅手撮數味消削之藥大索其酬而去咸以為得遇良醫一匕見效而不曉其真元受傷病根仍在不逾一日而前證復作且加泄瀉神昏矣再去奔請彼髠狡猾託言應請他出或言本地請者極多不得分身兩地竟拒而不來復請前醫前醫亦束手難於下藥往往致於不起嗟嗟杭城習俗大抵以耳為目好聽狡飾之言不好聽真實之語故以直道行實學之醫未有不為時所棄而彼髠者流害人纍纍猶奉若盧扁而終於不悟又可為三嘆者也産後血暈用醋炭熏鼻法好老酒和童便服之不可放倒如氣血脫而暈者必唇口手足厥冷無脈此時生死間不容髮當急以大劑參附回其陽如認作血暈而以前法治之則斃矣産後發熱乃氣血大虧也即有見識者亦必曰發散固不可且以輕劑疏通之此一句害人不淺總之脈必浮數與外感無辨一時不敢驟補也殊不知産後發熱我不管其是邪非邪有脈無脈一味八珍十全峻補之有邪自然汗解無邪自然熱退矣楊潛村曰産後亦有食物太早氣弱不能運而發熱者必兼噁心飽悶治宜健運為主又有乳結不通作熱者治宜通乳若外感發熱必兼頭痛拘急等證脈必浮數有力補中益氣加芎蘇熱服補以散之切忌發汗按産後固然氣血多虛然稟氣大旺者全然不見虛狀即或身體虛弱而所犯者確是實證斯皆不可一例而論也張景嶽全書云嘗讀丹溪書謂産後當大補氣血即有雜證以末治之一切病多是血虛皆不可發表此其意謂血氣隨胎而去必屬大虛故無論諸證皆當以大補為先其他皆屬可緩余於初年佩服其説及執而用之則每為所困經歷數次始悟其言雖有理而未免言之過也蓋産後氣血俱去誠多虛證然有虛者有不虛者有全實者凡此三者但當隨證隨人辨其虛實以常法治療不得執有成心概行大補以致助邪此辨之不可不真也景嶽現身説法一片婆心有益後人不淺鼓峰所謂不管是邪非邪有脈無脈一味八珍十全峻補之説屬一偏之見也學人苟能參觀而分別用之悉因其人其證而或清或補各得其宜庶幾可以兩全而無偏失之患哉瘀血痛不發熱者以生地酒洗三錢當歸二錢桃仁去皮尖錢半白朮酒炒牛膝酒洗微炒青皮丹皮各一錢川芎八分與服二三劑自愈愈後即以八珍湯調之如瘀血痛而發熱者四物湯加桃仁紅花丹皮足矣然俟腹痛口渴一退亦以八珍湯與之瘀血發熱腹必痛口必微渴余嘗治一潘姓婦産後瘀痛産科用行瘀化滯藥者二十餘日瘀全不下其腹脹硬晝夜發熱飲食不入唇焦舌裂目睛赤而不和脈結澀而似無根呻吟叫苦無有寧晷諸醫束手其父延余診視余曰觀其脈證大勢已危矣論瘀血蓄積固當用逐但産後氣血兩虧陽機不化雖用硝黃不能推動惟有重劑溫補一法尚可救全其他則非余所知也其父與夫悉首肯求救乃以人參三錢附子炮薑各二錢肉桂錢半黃耆於朮各一兩歸身五錢炙甘草一錢定方命服服竟其婦連聲號叫一茶頃小腹作響下紫黑血塊如碗大者三四杯大者五六又一茶頃瘀血幾滿床席而人昏厥矣急以二煎灌之漸漸蘇醒身汗如雨更配一劑夜分服之次日遂安産後泄瀉斷不可利水如有此等證一味補中益氣湯加白芍如發熱而渴乃陰竭也六味丸另煎六君子湯或人參湯下之産後不大便有至二十餘日者不足為患然産婦急於便必多努力往往成玉門不閉子宮下墜之病治之貴早一味用八珍湯加桃仁杏仁各二錢多則二三劑自下矣子宮下墜乃勞力所傷也補中益氣湯加白芍倍用參耆白朮如下墜而痛大劑歸脾湯加白芍如因惱怒下墜而痛此驟動肝火所致歸脾湯加丹皮山梔然當治之於早如子宮乾枯不能升矣玉門不閉治同産後感風率多成痓者氣血虛故也剛痓由血虛大劑四物湯倍用歸地加鉤藤鉤軟柴胡柔痓由氣虛補中益氣湯加鉤藤鉤軟柴胡如主去風燥血之劑則筋攣而成痙矣無汗為剛痓有汗為柔痓剛柔二痓作風燥治者真是不明理庸醫然用四物及補中益氣二方又配軟柴胡輕者可以取效若劇者非大溫補不可遲亦不效産後咳嗽弱證之漸也六味飲加人參主之如兼發熱歸脾湯去木香加白芍麥冬五味吞六味丸然當於初起時即用此藥或有可救者如經發散用過涼藥不效産後咳嗽此二方雖穩當若稍兼虛寒更當重劑溫補若僅用此二方不知變換亦恐成弱婦女帶下帶下是脾土虧損不能攝水也六君子湯加炮薑以實之甚者補中益氣湯加白芍半夏久服自除如脾土濕熱下流者六君子湯加柴胡黃芩丹皮白芍如惱怒傷肝者加味逍遙散加人參虧損者起於勞力面色痿黃不思飲食脈必大而無力且遲腰痠腳軟濕熱者起於飲食不節或多嗜酒帶色必兼黃濁而濃脈必大而有力兼見腰痠惱怒者以前諸證俱無但見面色常帶紅胸中常悶熱脈必弦數而有力帶證皆由中土虧損帶脈不能收引以致十二經脈因而內陷也重劑溫補頻頻服去一月少愈百日可除婦女淋證淋證婦女俱屬肝經濕火或小腸移熱一味逍遙散加六味若見發熱便屬陰虛疏肝益腎湯小兒痘瘡發熱時先看有痘情然後用藥何謂痘情必先見耳冷骪冷腳冷眼如含水懶於言笑是也斯時投以加味葛根湯服至見點葛根青皮升麻桔梗前胡山楂木通荊芥撫芎燈芯甘草三日後用紅花湯紅花蟬退升麻桔梗前胡山楂木通荊芥撫芎燈芯甘草如服加味葛根湯後而不見點是毒盛也其證必重若熱甚氣悶譫語腰無力冬月即於葛根湯加麻黃一錢夏月加石膏一錢甚者加至二錢如冬月熱甚過四五日重證已見而舌灰白色者亦須以石膏合麻黃用之夏月蘇葉薄荷俱可進退用之若見點如粳粞齊布熱甚口臭此脾經痘也死不治如見點三日痘已齊而熱不退此是毒盛危候見矣須以涼藥涼血紅花湯去升麻撫芎山楂加生地丹皮與之然此是乾紅候百不一活六日已過痘腳已齊漿勢欲行矣服桔梗湯桔梗前胡紅花荊芥蟬退殭蠶牛蒡子燈芯通草又三日發熱起頂濃漿至矣當和其毒丹皮丹參天花粉連翹荊芥木通殭蠶其有變白色而發癢者氣血虧也五味異功散加白芍以救其元氣虛甚者加人參白朮五六錢大劑用之自然有效或泥於庸醫發未盡而禁補或反咎發表欠透以致今日內陷者此殺人之論不可信也信手大補不一二劑必然窠下漿來生氣勃然矣即有撏掐破者亦自循皮爛臭而回生五味異功散人參白朮茯苓甘草陳皮有一種變黑者乃毒盛變黑歸腎火盛水反制之從其化也非真有毒能歸腎經也要在放點時必然部位不妙或根窠腳地有不如式醫者須先決到某日變黑歸腎而死又有一種灰白色者亦毒盛也然不癢須以當歸黃連湯與之當歸黃連生地黃金銀花天花粉牛蒡子荊芥殭蠶丹皮燈草自行起發至頂已起矣至第六日當有回意用保元湯人參黃耆甘草至七八日竟用加味異功散加白朮人參黃耆白芍茯苓陳皮甘草煨薑大棗如漿有不起頂不充滿而發癢窠殼脫落如梅花片下發瀉者虛甚也五味異功散加黃耆木香甚者附子肉桂吳茱萸俱當用見點至回十二日矣斯時惟恐摧折之餘虛寒必甚醫者須謹慎將養之切莫以為結痂在邇不足慮也一味加味異功散直服至脫痂而色紅方以飲食補之初起時發熱一二日便抽搐驚叫不省人事眼直或閃爍無定或舞唇弄舌魚口角弓等證此是心經痘也不必慌忙但用加味葛根湯當此之時痘已隱隱在皮膚間矣細看自然吉順凡心經痘決稀自起至收只要順序調理決無變證肺經痘見點熱久或少見咳嗽點數不多不過百餘粒吉多凶少竟可不藥不過發熱時用幾劑表藥而已肝經痘吉凶相半然要論歲氣有歲氣合者其痘必吉居八九凶者或有一二吉者發熱見點起漿結痂按日而來其有傳變者皆屬肝經古云肝經多變是也肝經痘不大不小顆數調勻脾經痘最惡發熱時必如火烙放點時必如芝麻五六日定胃爛口臭五六日內芝麻點內忽然發斑九日必死矣腎經痘發熱時昏沉壯熱四五日尚不見點忽然於腰下發斑十二日必死矣初放點必要在兩頰間鼻上然後看太陽部位俱有便是吉痘歌曰繞唇帶頰方為吉額角眉心總是凶有面部未見而額下一片簇簇而來凶痘也不治有面部未見而胸脯簇簇一片及背上簇簇一搭先見者俱不祥面部一見四肢必朗朗而來總之順不嫌多逆怕一點即彌月小兒緊密亦何妨但要調護得法而已樹小花多此俗論也如兒小甚不能服藥不可強與乳母服藥以過其氣可也此論道理如是若論小兒初生不過一點精血凝聚耳初無飲食之毒寒暑風露之感根於天者吉勿藥可也但得乳母謹慎切戒油膩煿炙辛辣酒醋等物勿犯汙穢不潔之氣足矣時取茵陳燒之懸酒噴胡荽於床間以發其氣兒自安穩也如以數日內之嬰兒亦如童子按方投藥痘雖吉而凶矣以其臟腑脆薄未得水穀之氣也如根於天者凶即藥亦何效哉痘初發時要他瀉瀉一通則痘起發幾分何也毒傳腑也是里傳表也點一有即禁瀉如不止而痘色漸漸白面色晃晃而白急以六君子湯加煨薑救之不可泥於毒未盡而猶多畏忌也如果毒甚而瀉則嬰兒必捏扤不安口渴唇紅面色壅盛氣粗如點不齊不可用寒涼只發表足矣如齊而猶瀉雖黃連亦所必用即於葛根湯加黃連七分可也肚痛一證最惡候也未見點而痛葛根湯加麻黃亦可有痛而身彎不能立者腎敗矣不治見點肚痛亦須發之痘色不變者可治起頂發漿時而痛是虛五味異功散加白芍寒戰咬牙初起者毒盛也然咬牙者多而寒戰者少起漿之後寒戰咬牙者悉屬虛黃耆白朮散甚者加煨薑桂附小兒痧證痧證即疹子又姓瘄子準繩云痧證初起用升麻葛根湯合瀉白散其間宜加桔梗牛蒡子荊芥連翹薄荷等尤為至當次日標形顴鼻見點多者最吉以其清陽喜上升也第二日葛根可去惡其開肌腠而耗津液也若熱甚勢重前湯必合白虎芩粉之類斷不可少若服藥後而熱愈甚者正毒達之故也得大汗而毒自解矣若略見標而不見形者此為痧毒不透後必防疳宜從養陰治甘露飲主之必多服乃效亦從汗解乃屢驗者又有一等小兒乳疹一口可解不必循三日九朝之説此以清火為主兼解可也緣小兒稟質尚弱神氣有限如遇粗工不審虛實發散過多常致正氣虛脫而不可救者多矣有痧毒痰喘甚者雖用石膏黃連如水淋石要知疹毒痰火壅結上焦之故宜用栝蔞霜枳殼花粉金沸草等消痰清火如夾氣虛者加人參立應如痰上壅盛者可用牛黃珍珠散痧證腹痛者乃毒鬱於陽明故也宜服升麻石膏黃連之類若毒鬱於太陽以苦梗開之痧證多泄瀉慎勿止澀惟用升麻葛根黃連甘草則泄瀉自止痧家不忌瀉瀉則陽明之邪熱得解是亦表裡分消之義也痧後泄瀉及便膿血皆由熱邪內陷故也大忌止澀惟宜升散仍用升麻乾葛湯加黃連扁豆若便膿血加滑石必愈痧證不宜依證施治惟當治本本者手太陰足陽明兩經之邪熱也解其邪熱則諸證自退矣升麻葛根湯升麻葛根白芍甘草白虎湯石膏知母甘草粳米甘露飲熟地生地天門冬麥門冬石斛黃芩枇杷葉甘草積殼茵陳吃乳小兒尚未出痘有患疹者名曰奶疹不可與治正疹同法今之兒醫皆不諳此往往誤人辛巳六月疹證盛行沿門比戶壞者纍纍余家患此者大小有七八人次兒未周歲發熱咳嗽兒醫亦作疹治辛涼透發凡三四日皮腠間若有若無遂認為皮里癮悶證也危言相恐更用大涼大發且禁吃乳余亦不經意以事出門抵暮方歸見其啼聲不出面青囟陷四肢與鼻尖俱冷忙捧至懷細視之頭向余胸似覓乳狀視其脈極微息止二三至急呼與乳盡其飽吮面色稍和肢體微溫囟亦略起但哭竟無聲少頃大瀉如水急投附子理中湯始得安臥次早熱退而疹亦不見矣連服溫補半月啼聲始出兒醫之子所患略同余以此告之勉其速進參附渠惑於家學不信余言反以為荒唐之説其兒竟以寒涼致死嗟乎不但誤人兼且誤己執迷不悟始終一轍甚為憫之常謂為醫者當虛心博覽事事討一分曉然後出而應世致誤者庶幾少耳小兒吐瀉小兒吐瀉除是明知停食受寒方可消導如枳朮二陳平胃之類其餘吐瀉乃肝木乘土而來急以七味白朮散安之萬無失一暑月尤宜補正吐加半夏七分薑汁製瀉加白芍一錢酒洗炒七味白朮散人參白朮茯苓甘草木香三分藿香八分乾葛八分煨薑引兒醫於小兒吐瀉不審病因總以驚風痰食為混詞專以發散消克為治法馴致成慢脾風者不少能遵錢氏專主七味白朮散赤子之無辜而枉死者可少免矣小兒驚證驚證無論輕重一味五味異功散加軟柴胡鉤藤鉤即為外物所驚亦是木氣虛而受切勿投抱龍鎮驚等丸前人皆云肝無補法惟涼惟瀉先生獨云木氣虛而用異功散勿用鎮墜之品高出前一籌小兒疳證疳病無論五疳虛實一味五味異功散加黃連木香萬不失一若頭大肚大筋青四肢獨細即黃連木香亦不可用一味參苓白朮散主之如疳而有蟲大便必似水而焦赤無渣滓者是也甚至經年纍月並用五味異功散一料加蝦蟆一枚酒炙川黃連五錢薑汁拌炒參苓白朮散人參白朮各五錢茯苓薏米仁扁豆芡實山藥川黃連各三錢桔梗砂仁甘草炙各五錢小兒疳病即大人之虛勞所列方論補中兼運甚當若虛寒者亦須溫補傷寒捷論表證脈浮發熱惡寒頭痛項強身痛四肢拘急面慘灑淅喘與咳嗽目舌和口不渴大小便如常皆屬表證必待表解方可攻裡若誤下之必為痞為結胸為懊憹矣肌肉脈尺寸俱長目痛鼻乾唇焦漱水不欲咽俱邪在陽明肌肉經也勿將臟腑混治半表半裡脈不浮不沉頭汗出盜汗耳聾舌滑脅痛嘔吐口苦目眩往來寒熱默默不欲飲食未經下過胸中脹滿皆半表半裡證也此經有三禁惟小柴胡加減和解誤用他藥則為壞病矣傳經里證脈沉而有力自汗潮熱惡熱腹痛下痢腸垢下利清黃水小腹滿而硬者硬而痛者大便祕結小便多者轉失氣咽乾齒燥目不明不得眠譫語狂斑頭痛發熱俱止手足心並腋下有汗出舌胎黃黑及津液枯稿已上不拘日數多少皆傳裡證也下之無疑若誤汗之則為狂為斑爛矣直中里證脈沉細無力乾嘔不渴嘔吐清涎背惡寒倦臥多眠囊縮唇甲青身痛如被杖四肢拘急不發熱四肢厥冷過肘膝不頭痛發熱惡寒身痛綿綿腹痛下利清穀小便清長色白皆直中裡寒證也溫之無疑表裡俱見頭痛發熱表證下利清穀里證腹痛口渴甚里證脈浮表證大便閉里證倘微惡寒表證未解此皆表裡俱見證也或先解表或先救里要在活法以治之此數條是為後學開一辨證捷法第不從仲景論中參出而於節六菴書脫化於形層氣化陰陽標本之旨終不能無毫釐之差跋鼓峰醫術自是高手四明人傳其起痼扶衰懸決生死日時多奇驗及觀其自述醫案中所載語溪呂氏婦産後驚悸診脈而知其幼時有齒病致大驚之事詢之果然人問何以知此答曰脈法當如是耳不精於象數鈐法之學不能也我儀其人必旁通象數之學而參用其術以決嫌疑別可否治令人震駭其言若神明要之不盡自醫經中來所著心法一書學人多遵用之其中方論往往偏尊於一説夫疾之表裡寒熱判分兩途祗説一邊遺失一邊緣是下筆不能周到耳想其學識未必偏著如此但人辨脈不明審證不確依樣畫葫蘆而嘗試其法恐不能不致失手之患念菴奮筆糾繩補偏救弊為學人指示迷津一準上古經論謂為後輩之良導師也可即謂為先輩之諍友也亦可乾隆丙戌正月辛未朔後九日庚辰錢江王琦
